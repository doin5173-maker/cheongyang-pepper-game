<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>청양고추 구출작전 결과 대시보드</title>
    <style>
      :root {
        --pepper: #d92323;
        --leaf: #2e9e44;
        --blue: #1f6fd1;
        --bg: #f5f8fc;
        --border: #d9e2ef;
        --text: #1f2937;
        --muted: #667085;
        --card: #ffffff;
        --warn: #f97316;
        --shadow: 0 14px 30px rgba(31, 41, 55, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(235, 247, 239, 0.82), rgba(245, 248, 252, 0.98)),
          var(--bg);
        font-family:
          "Noto Sans KR",
          "Pretendard",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 4px solid rgba(31, 111, 209, 0.2);
        outline-offset: 2px;
      }

      .shell {
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: start;
        padding: 20px 0 14px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        color: #111827;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 1000;
        line-height: 1.15;
      }

      .subtitle {
        margin-top: 8px;
        color: #344054;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.55;
      }

      .status-pill {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid #bbf7d0;
        border-radius: 999px;
        background: #f0fdf4;
        padding: 8px 14px;
        color: #166534;
        font-size: 14px;
        font-weight: 1000;
        white-space: nowrap;
      }

      .status-pill.loading {
        border-color: #c8dcff;
        background: #eef6ff;
        color: var(--blue);
      }

      .status-pill.error {
        border-color: #fed7aa;
        background: #fff7ed;
        color: #9a3412;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(180px, 1.4fr) repeat(3, minmax(150px, 1fr));
        gap: 10px;
        padding: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        color: #344054;
        font-size: 13px;
        font-weight: 1000;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 44px;
        border: 2px solid #d9e2ef;
        border-radius: 12px;
        background: #ffffff;
        padding: 0 12px;
        color: var(--text);
        font-size: 15px;
        font-weight: 800;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--blue);
        outline: none;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        border-top: 1px solid var(--border);
        padding: 14px;
      }

      .hint {
        flex: 1 1 260px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.45;
      }

      .button {
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        padding: 0 16px;
        color: #ffffff;
        background: linear-gradient(180deg, #2a83e9, var(--blue));
        font-size: 15px;
        font-weight: 1000;
        box-shadow: 0 4px 0 #1456a9;
        cursor: pointer;
      }

      .button.secondary {
        border: 2px solid #c8dcff;
        color: #174ea6;
        background: #ffffff;
        box-shadow: none;
      }

      .button:disabled {
        color: #64748b;
        background: #cbd5e1;
        box-shadow: none;
        cursor: default;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin-top: 14px;
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: #ffffff;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(31, 41, 55, 0.07);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 1000;
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        color: #111827;
        font-size: clamp(24px, 4vw, 34px);
        font-weight: 1000;
        line-height: 1;
      }

      .table-panel {
        margin-top: 14px;
        overflow: hidden;
      }

      .table-head {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        padding: 14px;
      }

      .table-head h2 {
        color: #111827;
        font-size: 18px;
        font-weight: 1000;
      }

      .row-count {
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .table-scroll {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 880px;
        border-collapse: collapse;
        background: #ffffff;
      }

      th,
      td {
        border-bottom: 1px solid #edf2f7;
        padding: 12px 14px;
        text-align: left;
        vertical-align: middle;
      }

      th {
        color: #344054;
        background: #f8fbff;
        font-size: 13px;
        font-weight: 1000;
        white-space: nowrap;
      }

      td {
        color: #1f2937;
        font-size: 14px;
        font-weight: 800;
      }

      .score {
        color: var(--pepper);
        font-weight: 1000;
      }

      .type {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 1000;
      }

      .type.participant {
        color: #166534;
        background: #dcfce7;
      }

      .type.test {
        color: #174ea6;
        background: #dbeafe;
      }

      .type.staff {
        color: #9a3412;
        background: #ffedd5;
      }

      .empty,
      .error-box {
        padding: 34px 16px;
        color: var(--muted);
        font-size: 15px;
        font-weight: 900;
        line-height: 1.6;
        text-align: center;
      }

      .error-box {
        color: #9a3412;
        background: #fff7ed;
      }

      @media (max-width: 820px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .status-pill {
          justify-self: start;
        }

        .filters {
          grid-template-columns: 1fr 1fr;
        }

        .stats {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 560px) {
        .shell {
          padding: 10px;
        }

        .filters,
        .stats {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: stretch;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>청양고추 구출작전 결과 대시보드</h1>
          <p class="subtitle">
            완료 기록을 실시간으로 확인하고, 참가자 구분과 점수 기준으로 필터링한 뒤
            CSV 파일로 내려받을 수 있습니다.
          </p>
        </div>
        <div id="connectionStatus" class="status-pill loading">실시간 연결 중</div>
      </header>

      <section class="panel" aria-label="결과 필터">
        <div class="filters">
          <div class="field">
            <label for="searchInput">이름 검색</label>
            <input id="searchInput" type="search" placeholder="이름 일부 입력" autocomplete="off" />
          </div>
          <div class="field">
            <label for="typeFilter">참가 구분</label>
            <select id="typeFilter">
              <option value="all">전체</option>
              <option value="참가자">참가자</option>
              <option value="테스트">테스트</option>
              <option value="직원">직원</option>
            </select>
          </div>
          <div class="field">
            <label for="scoreFilter">점수 구간</label>
            <select id="scoreFilter">
              <option value="all">전체</option>
              <option value="90">90점 이상</option>
              <option value="70">70점 이상</option>
              <option value="50">50점 이상 70점 미만</option>
              <option value="below50">50점 미만</option>
            </select>
          </div>
          <div class="field">
            <label for="gradeFilter">등급</label>
            <select id="gradeFilter">
              <option value="all">전체</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <div class="hint">
            CSV는 화면에 보이는 항목뿐 아니라 문서 ID, 세션 ID, 페이지 주소, 기기 정보 등
            저장된 모든 필드를 함께 포함합니다.
          </div>
          <button id="filteredCsvButton" class="button secondary" type="button">현재 표 CSV</button>
          <button id="allCsvButton" class="button" type="button">전체 완료 CSV</button>
        </div>
      </section>

      <section class="stats" aria-label="요약 통계">
        <div class="stat">
          <span>완료 인원</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat">
          <span>실제 참가자</span>
          <strong id="participantCount">0</strong>
        </div>
        <div class="stat">
          <span>평균 점수</span>
          <strong id="averageScore">0</strong>
        </div>
        <div class="stat">
          <span>최고 점수</span>
          <strong id="bestScore">0</strong>
        </div>
        <div class="stat">
          <span>90점 이상</span>
          <strong id="highScoreCount">0</strong>
        </div>
      </section>

      <section class="panel table-panel" aria-label="완료 기록">
        <div class="table-head">
          <h2>완료 기록</h2>
          <div id="rowCount" class="row-count">0건 표시 중</div>
        </div>
        <div id="tableArea" class="table-scroll">
          <div class="empty">완료 기록을 불러오는 중입니다.</div>
        </div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getFirestore,
        collection,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBu2bNQqCbUBex5YTt6QDxEjoFqyRyr_Gc",
        authDomain: "cheongyang-pepper-game.firebaseapp.com",
        projectId: "cheongyang-pepper-game",
        storageBucket: "cheongyang-pepper-game.firebasestorage.app",
        messagingSenderId: "494514068793",
        appId: "1:494514068793:web:dc0ac8f86e96491b7ddce8",
        measurementId: "G-J878P6QZNH",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let completionRows = [];
      let filteredRows = [];

      const elements = {
        connectionStatus: document.getElementById("connectionStatus"),
        searchInput: document.getElementById("searchInput"),
        typeFilter: document.getElementById("typeFilter"),
        scoreFilter: document.getElementById("scoreFilter"),
        gradeFilter: document.getElementById("gradeFilter"),
        filteredCsvButton: document.getElementById("filteredCsvButton"),
        allCsvButton: document.getElementById("allCsvButton"),
        totalCount: document.getElementById("totalCount"),
        participantCount: document.getElementById("participantCount"),
        averageScore: document.getElementById("averageScore"),
        bestScore: document.getElementById("bestScore"),
        highScoreCount: document.getElementById("highScoreCount"),
        rowCount: document.getElementById("rowCount"),
        tableArea: document.getElementById("tableArea"),
      };

      const filterControls = [
        elements.searchInput,
        elements.typeFilter,
        elements.scoreFilter,
        elements.gradeFilter,
      ];

      filterControls.forEach((control) => {
        control.addEventListener("input", applyFiltersAndRender);
        control.addEventListener("change", applyFiltersAndRender);
      });

      elements.filteredCsvButton.addEventListener("click", () => {
        downloadCsv(filteredRows, "filtered");
      });

      elements.allCsvButton.addEventListener("click", () => {
        downloadCsv(completionRows, "all");
      });

      onSnapshot(
        collection(db, "pepperGameLogs"),
        (snapshot) => {
          const rows = [];

          snapshot.forEach((doc) => {
            const data = doc.data();
            if (data.eventName !== "game_complete") return;

            rows.push(normalizeRow(doc.id, data));
          });

          completionRows = rows.sort((first, second) => {
            return getSortTime(second.createdAt) - getSortTime(first.createdAt);
          });

          setStatus("실시간 연결됨", "ready");
          populateGradeFilter();
          applyFiltersAndRender();
        },
        (error) => {
          setStatus("읽기 권한 확인 필요", "error");
          elements.tableArea.innerHTML = `
            <div class="error-box">
              결과를 읽지 못했습니다. Firebase Firestore 규칙에서 pepperGameLogs의 read 권한을
              행사 중에만 true로 바꾼 뒤 다시 열어 주세요.<br />
              오류: ${escapeHtml(error.message)}
            </div>
          `;
          updateCsvButtons();
        },
      );

      function normalizeRow(documentId, data) {
        const playerName = String(data.playerName || "").trim();
        const createdAt = normalizeDateValue(data.createdAt);

        return {
          ...data,
          documentId,
          eventName: data.eventName || "",
          participantType: getParticipantType(playerName),
          playerName,
          score: toNumber(data.score),
          correctCount: toNumber(data.correctCount),
          totalQuestions: toNumber(data.totalQuestions),
          grade: data.grade || "",
          createdAt,
          completedAtLocal: formatDateTime(createdAt),
          page: data.page || "",
          sessionId: data.sessionId || "",
          userAgent: data.userAgent || "",
        };
      }

      function getParticipantType(playerName) {
        if (playerName.startsWith("테스트-")) return "테스트";
        if (playerName.startsWith("직원-")) return "직원";
        return "참가자";
      }

      function applyFiltersAndRender() {
        const searchText = elements.searchInput.value.trim().toLowerCase();
        const selectedType = elements.typeFilter.value;
        const selectedScore = elements.scoreFilter.value;
        const selectedGrade = elements.gradeFilter.value;

        filteredRows = completionRows.filter((row) => {
          const matchesSearch = !searchText || row.playerName.toLowerCase().includes(searchText);
          const matchesType = selectedType === "all" || row.participantType === selectedType;
          const matchesScore = matchesScoreFilter(row.score, selectedScore);
          const matchesGrade = selectedGrade === "all" || row.grade === selectedGrade;

          return matchesSearch && matchesType && matchesScore && matchesGrade;
        });

        renderStats();
        renderTable();
        updateCsvButtons();
      }

      function matchesScoreFilter(score, filter) {
        if (filter === "90") return score >= 90;
        if (filter === "70") return score >= 70;
        if (filter === "50") return score >= 50 && score < 70;
        if (filter === "below50") return score < 50;
        return true;
      }

      function populateGradeFilter() {
        const currentValue = elements.gradeFilter.value;
        const grades = [...new Set(completionRows.map((row) => row.grade).filter(Boolean))].sort();

        elements.gradeFilter.innerHTML = '<option value="all">전체</option>';

        grades.forEach((grade) => {
          const option = document.createElement("option");
          option.value = grade;
          option.textContent = grade;
          elements.gradeFilter.appendChild(option);
        });

        elements.gradeFilter.value = grades.includes(currentValue) ? currentValue : "all";
      }

      function renderStats() {
        const sourceRows = filteredRows;
        const scores = sourceRows.map((row) => row.score).filter((score) => Number.isFinite(score));
        const totalScore = scores.reduce((sum, score) => sum + score, 0);
        const averageScore = scores.length ? Math.round(totalScore / scores.length) : 0;
        const bestScore = scores.length ? Math.max(...scores) : 0;

        elements.totalCount.textContent = sourceRows.length;
        elements.participantCount.textContent = sourceRows.filter(
          (row) => row.participantType === "참가자",
        ).length;
        elements.averageScore.textContent = averageScore;
        elements.bestScore.textContent = bestScore;
        elements.highScoreCount.textContent = sourceRows.filter((row) => row.score >= 90).length;
        elements.rowCount.textContent = `${sourceRows.length}건 표시 중`;
      }

      function renderTable() {
        if (!filteredRows.length) {
          elements.tableArea.innerHTML = '<div class="empty">조건에 맞는 완료 기록이 없습니다.</div>';
          return;
        }

        const rowsHtml = filteredRows
          .map((row) => {
            const typeClass =
              row.participantType === "테스트"
                ? "test"
                : row.participantType === "직원"
                  ? "staff"
                  : "participant";

            return `
              <tr>
                <td><span class="type ${typeClass}">${escapeHtml(row.participantType)}</span></td>
                <td>${escapeHtml(row.playerName || "-")}</td>
                <td class="score">${escapeHtml(String(row.score))}점</td>
                <td>${escapeHtml(String(row.correctCount))} / ${escapeHtml(String(row.totalQuestions))}</td>
                <td>${escapeHtml(row.grade || "-")}</td>
                <td>${escapeHtml(row.completedAtLocal || "-")}</td>
              </tr>
            `;
          })
          .join("");

        elements.tableArea.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>구분</th>
                <th>이름</th>
                <th>점수</th>
                <th>정답 수</th>
                <th>등급</th>
                <th>완료 시간</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        `;
      }

      function downloadCsv(rows, scope) {
        if (!rows.length) return;

        const headers = getCsvHeaders(rows);
        const lines = rows.map((row) => {
          return headers.map((header) => escapeCsvValue(row[header])).join(",");
        });
        const csvText = `\uFEFF${headers.join(",")}\r\n${lines.join("\r\n")}`;
        const blob = new Blob([csvText], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `cheongyang-pepper-results-${scope}-${getTodayText()}.csv`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      function getCsvHeaders(rows) {
        const preferredHeaders = [
          "documentId",
          "eventName",
          "participantType",
          "playerName",
          "score",
          "correctCount",
          "totalQuestions",
          "grade",
          "createdAt",
          "completedAtLocal",
          "page",
          "sessionId",
          "userAgent",
        ];
        const allHeaders = new Set();

        rows.forEach((row) => {
          Object.keys(row).forEach((key) => allHeaders.add(key));
        });

        const extraHeaders = [...allHeaders]
          .filter((key) => !preferredHeaders.includes(key))
          .sort((first, second) => first.localeCompare(second));

        return [...preferredHeaders.filter((key) => allHeaders.has(key)), ...extraHeaders];
      }

      function updateCsvButtons() {
        elements.filteredCsvButton.disabled = !filteredRows.length;
        elements.allCsvButton.disabled = !completionRows.length;
      }

      function setStatus(text, status) {
        elements.connectionStatus.textContent = text;
        elements.connectionStatus.className =
          status === "error" ? "status-pill error" : status === "ready" ? "status-pill" : "status-pill loading";
      }

      function normalizeDateValue(value) {
        if (!value) return "";
        if (typeof value === "string") return value;
        if (typeof value.toDate === "function") return value.toDate().toISOString();
        if (value instanceof Date) return value.toISOString();
        return String(value);
      }

      function formatDateTime(value) {
        if (!value) return "";

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);

        return new Intl.DateTimeFormat("ko-KR", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        }).format(date);
      }

      function getSortTime(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? 0 : date.getTime();
      }

      function toNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? number : 0;
      }

      function getTodayText() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function escapeCsvValue(value) {
        const normalizedValue =
          value && typeof value === "object" ? JSON.stringify(value) : value == null ? "" : String(value);
        return `"${normalizedValue.replaceAll('"', '""')}"`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
